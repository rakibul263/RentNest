<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentNest API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .topbar { 
      background: #1a1a2e; color: #fff; padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { font-size: 20px; font-weight: 600; }
    .topbar span { color: #888; font-size: 13px; }
    .topbar a { color: #82aaff; text-decoration: none; font-size: 13px; }
    .topbar a:hover { text-decoration: underline; }
    .base-url-badge {
      background: #2d2d4e; padding: 6px 12px; border-radius: 6px;
      font-size: 12px; color: #aaa; font-family: monospace;
    }
    #swagger-ui { max-width: 1400px; margin: 0 auto; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info .title small { background: #1a1a2e !important; }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>RentNest API</h1>
      <span>Rental Property Marketplace</span>
    </div>
    <div style="display:flex;align-items:center;gap:20px;">
      <span class="base-url-badge">Base URL: https://rentnest-api.vercel.app/api</span>
      <a href="https://github.com/rakibul263/RentNest" target="_blank">GitHub</a>
    </div>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: './openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset,
      ],
      layout: 'BaseLayout',
      docExpansion: 'list',
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 1,
      tryItOutEnabled: false,
      requestSnippetsEnabled: true,
    });
  </script>
</body>
</html>
